<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kolosal Ops Linktree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="bg-blob bg-blob--top"    aria-hidden="true"></div>
  <div class="bg-blob bg-blob--bottom" aria-hidden="true"></div>

  <div class="container">

    <!-- ── Profile ─────────────────────────────────────── -->
    <header class="profile">
      <div class="avatar-ring">
        <div class="avatar-wrapper">
          <img
            class="avatar"
            src="https://media.licdn.com/dms/image/v2/D560BAQHDjyHMSTeqkA/company-logo_200_200/company-logo_200_200/0/1720265578359?e=2147483647&v=beta&t=k_NLZHqyLgItOaGMjxf_JbYM8kCM49Kq4nviqzAqXpA"
            alt="Kolosal AI Logo"
            onerror="this.style.display='none'; document.querySelector('.avatar-fallback').style.display='flex';"
          />
          <div class="avatar-fallback" aria-hidden="true">K</div>
        </div>
      </div>
      <h1 class="profile-name">Kolosal Ops</h1>
      <p class="profile-handle">@kolosal.ai</p>
      <p class="profile-bio">AI-powered operations &amp; financial intelligence</p>
    </header>

    <!-- ── Search ─────────────────────────────────────── -->
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="text" placeholder="Search links…" autocomplete="off" aria-label="Search links" />
      <button class="search-clear" id="search-clear" aria-label="Clear search" style="display:none">×</button>
    </div>

    <!-- ── Links (rendered by script.js) ─────────────── -->
    <main class="links-container" id="links-container" aria-label="Navigation links"></main>

    <!-- ── Add Link Button ─────────────────────────────── -->
    <button class="fab" id="fab-add" aria-label="Add new link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Link
    </button>

    <!-- ── Tools (Export / Import) ───────────────────── -->
    <div class="tools-row">
      <button class="btn-tool" id="btn-export">↓ Export</button>
      <label class="btn-tool" for="import-file">↑ Import</label>
      <input type="file" id="import-file" accept=".json" hidden />
    </div>

    <!-- ── Social ──────────────────────────────────────── -->
    <section class="socials" aria-label="Social media">
      <a class="social-icon" href="https://www.linkedin.com/company/kolosal-ai/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </section>

    <!-- ── Footer ──────────────────────────────────────── -->
    <footer class="footer">
      <p>© 2025 Kolosal AI · <a href="https://linktr.ee/kolosal.ai" target="_blank" rel="noopener noreferrer">linktr.ee/kolosal.ai</a></p>
    </footer>

  </div>

  <!-- ── Modal ───────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <h2 class="modal-title" id="modal-title">Add Link</h2>
      <form id="add-link-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="input-url">URL</label>
          <input class="form-input" id="input-url" type="url" placeholder="https://example.com" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label" for="input-label">Label</label>
          <input class="form-input" id="input-label" type="text" placeholder="Link display name" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label" for="input-category">
            Category <span class="form-hint" id="cat-hint"></span>
          </label>
          <select class="form-input form-select" id="input-category">
            <option value="Finance">Finance</option>
            <option value="Legal">Legal</option>
            <option value="Education">Education</option>
            <option value="Workspace">Workspace</option>
            <option value="Other" selected>Other</option>
          </select>
        </div>
        <input type="hidden" id="input-id" />
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="btn-submit">Add Link</button>
        </div>
      </form>
      <div class="modal-footer">
        <button type="button" class="btn-reset" id="btn-reset">Reset to defaults</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
